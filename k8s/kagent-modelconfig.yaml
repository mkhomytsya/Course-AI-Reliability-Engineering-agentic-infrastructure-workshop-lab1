apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: openai-via-agentgateway
  namespace: kagent
spec:
  provider: OpenAI
  model: gpt-4.1-mini
  apiKeySecret: kagent-openai
  apiKeySecretKey: OPENAI_API_KEY
  openAI:
    baseUrl: "http://agentgateway.default.svc.cluster.local:8080/v1"
